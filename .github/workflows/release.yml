name: Release Gios CLI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          
      - name: Determine Version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "VERSION=$TAG" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
          else
            SPECIFIC_VERSION=$(git describe --tags --always --match "v*.*.*" 2>/dev/null || echo "latest")
            echo "VERSION=$SPECIFIC_VERSION" >> $GITHUB_OUTPUT
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Binaries and Generate Manifest
        run: |
          make build-all VERSION=${{ steps.version.outputs.VERSION }}
          make release-manifest VERSION=${{ steps.version.outputs.VERSION }}

      - name: Create Tagged Release
        uses: softprops/action-gh-release@v1
        if: steps.version.outputs.IS_TAG == 'true'
        with:
          files: build/*
          tag_name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          
      - name: Update Nightly Release
        uses: softprops/action-gh-release@v1
        if: steps.version.outputs.IS_TAG == 'false' && github.ref == 'refs/heads/main'
        with:
          name: "Nightly Build (${{ steps.version.outputs.VERSION }})"
          tag_name: latest
          files: build/*
          prerelease: true
          make_latest: false
