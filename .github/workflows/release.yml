name: Release Gios CLI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Determine Version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build Binaries and Generate Manifest
        run: |
          mkdir -p build
          
          echo "version: ${{ steps.version.outputs.VERSION }}" > build/release.yml
          echo "binaries:" >> build/release.yml
          
          build_binary() {
            local os=$1
            local arch=$2
            local ext=$3
            local name="gios-${os}-${arch}${ext}"
            
            echo "Building $name..."
            GOOS=$os GOARCH=$arch go build -o "build/$name" main.go
            
            local hash=$(sha256sum "build/$name" | awk '{print $1}')
            
            echo "  - os: $os" >> build/release.yml
            echo "    arch: $arch" >> build/release.yml
            echo "    executable: $name" >> build/release.yml
            echo "    sha256: $hash" >> build/release.yml
          }
          
          # Linux
          build_binary linux amd64 ""
          build_binary linux arm64 ""
          
          # macOS
          build_binary darwin amd64 ""
          build_binary darwin arm64 ""
          
          # Windows
          build_binary windows amd64 ".exe"
          build_binary windows arm64 ".exe"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/*
          generate_release_notes: true
          
      # Fallback for main branch (Prerelease/Nightly loop)
      - name: Update Latest Release (Main)
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          name: Latest Build
          tag_name: latest
          files: build/*
          prerelease: false
