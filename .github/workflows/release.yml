name: Release Gios CLI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Auto Tag Version
        id: autotag
        if: "${{ github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore: bump version') }}"
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Determine Version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          elif [[ "${{ steps.autotag.outputs.new_tag }}" != "" ]]; then
            TAG=${{ steps.autotag.outputs.new_tag }}
          else
            TAG=$(git describe --tags --always --match "v*.*.*" 2>/dev/null || echo "latest")
          fi
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT
          
          if [[ $GITHUB_REF == refs/tags/* ]] || [[ "${{ steps.autotag.outputs.new_tag }}" != "" ]]; then
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Binaries and Generate Manifest
        run: |
          make build-all VERSION=${{ steps.version.outputs.VERSION }}
          make release-manifest VERSION=${{ steps.version.outputs.VERSION }}

      - name: Create Versioned Release
        uses: softprops/action-gh-release@v2
        if: steps.version.outputs.IS_RELEASE == 'true'
        with:
          files: build/*
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          make_latest: true
          
      - name: Update Nightly Release (Non-Main)
        uses: softprops/action-gh-release@v2
        if: steps.version.outputs.IS_RELEASE == 'false'
        with:
          name: "Nightly Build (${{ steps.version.outputs.VERSION }})"
          tag_name: latest
          files: build/*
          prerelease: true
          make_latest: false
